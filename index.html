<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

<div class="settings-bar">
  <select id="langSelect" onchange="changeLanguage(this.value)">
    <option value="ko">🇰🇷 KO</option>
    <option value="en">🇺🇸 EN</option>
    <option value="ja">🇯🇵 JA</option>
  </select>
  <button id="themeToggle" onclick="toggleDarkMode()">🌙</button>
</div>

<div class="game-container">
  <header>
    <h1 id="ui-title">포커 게임</h1>
    <div class="money-display">
      <span role="img" aria-label="money">💰</span>
      <span id="ui-money-label">자산</span>: 
      <span id="money">1,000</span>
    </div>
    <div class="bet-container">
      <label for="bet" id="ui-bet-label">베팅:</label>
      <select id="bet"></select>
    </div>
    <div class="bonus-container" style="text-align: center; margin-top: 10px;">
      <button id="howToPlayBtn" style="cursor:pointer; padding: 8px 20px; border-radius: 20px; background: #4a90e2; color: white; border: none; font-weight: bold;">
        <span id="ui-how-to-text">❓ 게임 방법</span>
      </button>
      <p id="ui-bonus-info" style="font-size: 12px; color: #888; margin-top: 5px;">(1시간마다 500원 자동 지급)</p>
    </div>
  </header>

  <section class="payout-section">
    <h3 id="ui-payout-title">배당표</h3>
    <ul id="payoutTable">
      <li id="파이브 카드"><span>파이브 카드</span> <span>100배</span></li>
      <li id="로얄 스트레이트 플러시"><span>로얄 스트레이트 플러시</span> <span>50배</span></li>
      <li id="스트레이트 플러시"><span>스트레이트 플러시</span> <span>30배</span></li>
      <li id="포카드"><span>포카드</span> <span>15배</span></li>
      <li id="풀하우스"><span>풀하우스</span> <span>7배</span></li>
      <li id="플러시"><span>플러시</span> <span>5배</span></li>
      <li id="스트레이트"><span>스트레이트</span> <span>3배</span></li>
      <li id="트리플"><span>트리플</span> <span>2배</span></li>
      <li id="투페어"><span>투페어</span> <span>1배</span></li>
      <li id="원페어"><span>원페어</span> <span>0.5배</span></li>
    </ul>
  </section>

  <section id="gameArea">
    <div id="cards" class="cards"></div>
    <div class="button-group">
      <button id="startBtn">시작</button>
      <button id="exchangeBtn" style="display:none;">교환</button>
    </div>
    <p id="result" class="result-text"></p>
  </section>

  <div id="miniConfirmUI" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; border: 3px solid #ffcc00; padding: 30px; z-index: 10000; text-align: center; color: white; border-radius: 15px; min-width: 280px; box-shadow: 0 0 50px rgba(0,0,0,0.8);">
    <h2 id="confirmMsg" style="margin-bottom: 25px; font-size: 1.1rem; line-height: 1.6; color: #fff;"></h2>
    <div style="display: flex; gap: 15px; justify-content: center;">
      <button id="acceptBtn" style="padding: 12px 30px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 1rem;">수락</button>
      <button id="rejectBtn" style="padding: 12px 30px; background: #dc3545; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 1rem;">거절</button>
    </div>
  </div>

  <section id="miniGame" class="mini-game" style="display:none;">
    <h2 id="ui-mini-title" style="color: #ffcc00;">DOUBLE CHANCE</h2>
    <div class="mini-cards" style="display: flex; justify-content: center; gap: 20px; margin: 20px 0;">
      <div id="leftCard" class="card">
        <div class="inner flip">
          <div class="front"></div>
          <div class="back"></div>
        </div>
      </div>
      <div id="rightCard" class="card">
        <div class="inner flip">
          <div class="front"></div>
          <div class="back"></div>
        </div>
      </div>
    </div>
    
    <div class="button-group">
      <button id="ui-high-btn" onclick="guess('high')">더 큼 (HIGH)</button>
      <button id="ui-low-btn" onclick="guess('low')">더 작음 (LOW)</button>
     
    </div>
    <p id="miniResult" class="result-text" style="font-weight: bold; font-size: 1.2rem; margin-top: 15px;"></p>
  </section>
</div>

</body>
</html>

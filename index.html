<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

<div class="settings-wrapper">
  <button id="settingsOpenBtn">
    <span class="icon">⚙️</span>
    <span class="text" id="ui-options-text">옵션</span>
  </button>
</div>

<div id="settingsUI" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; border: 2px solid #4a90e2; padding: 25px; z-index: 10003; text-align: center; color: white; border-radius: 20px; width: 85%; max-width: 320px; box-shadow: 0 0 50px rgba(0,0,0,0.9);">
  <h2 id="ui-settings-title" style="margin-bottom: 20px; color: #4a90e2; font-size: 1.4rem;">⚙️ 설정</h2>

  <div style="margin-bottom: 20px; text-align: left;">
    <label id="ui-lang-label" style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: #888;">언어 설정 (Language)</label>
    <select id="langSelect" onchange="changeLanguage(this.value)" style="width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 10px; font-size: 1rem;">
      <option value="ko">🇰🇷 한국어 (KO)</option>
      <option value="en">🇺🇸 English (EN)</option>
      <option value="ja">🇯🇵 日本語 (JA)</option>
    </select>
  </div>

  <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
    <span id="ui-theme-label" style="font-size: 1rem;">테마 설정 (Dark/Light)</span>
    <button id="themeToggle" style="padding: 10px 20px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 10px; cursor: pointer;">🌙</button>
  </div>

  <div style="margin-bottom: 30px; text-align: left;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
      <span id="ui-vol-label" style="font-size: 1rem;">소리 크기 (Volume)</span>
      <span id="volValue">50%</span>
    </div>
    <input type="range" id="volumeControl" min="0" max="100" value="50" style="width: 100%; cursor: pointer; accent-color: #4a90e2;">
  </div>

  <button id="settingsCloseBtn" style="padding: 14px 0; background: #4a90e2; color: white; border: none; cursor: pointer; border-radius: 12px; font-weight: bold; width: 100%; font-size: 1.1rem;">저장 및 닫기</button>
</div>

<div class="game-container">
  <header>
    <h1 id="ui-title">포커 게임</h1>
    <div class="money-display">
      <span role="img" aria-label="money">💰</span>
      <span id="ui-money-label">자산</span>: 
      <span id="money">3,000</span>
    </div>

<div class="jackpot-container" style="
    background: linear-gradient(135deg, #2c3e50, #000);
    border: 2px solid #ffcc00;
    border-radius: 15px;
    padding: 10px;
    margin: 10px auto;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
">
  <span style="color: #ffcc00; font-size: 0.9rem; font-weight: bold; text-transform: uppercase;">🏆 Jackpot</span>
  <div style="color: #fff; font-size: 1.8rem; font-weight: bold; font-family: 'Courier New', Courier, monospace;">
    💰 <span id="jackpot-amount">0</span>
  </div>
</div>

    <div class="bet-container">
      <label for="bet" id="ui-bet-label">베팅:</label>
      <select id="bet"></select>
    </div>
    <div class="bonus-container" style="text-align: center; margin-top: 10px;">
      <button id="howToPlayBtn" style="cursor:pointer; padding: 8px 20px; border-radius: 20px; background: #4a90e2; color: white; border: none; font-weight: bold;">
        <span id="ui-how-to-text">❓ 게임 방법</span>
      </button>
      <p id="ui-bonus-info" style="font-size: 12px; color: #888; margin-top: 5px;">(1시간마다 500원 자동 지급)</p>
    </div>
  </header>

  <section class="payout-section">
    <h3 id="ui-payout-title">배당표</h3>
    <ul id="payoutTable">
      <li id="파이브 카드"><span>파이브 카드</span> <span>100배</span></li>
      <li id="로얄 스트레이트 플러시"><span>로얄 스트레이트 플러시</span> <span>50배</span></li>
      <li id="스트레이트 플러시"><span>스트레이트 플러시</span> <span>30배</span></li>
      <li id="포카드"><span>포카드</span> <span>15배</span></li>
      <li id="풀하우스"><span>풀하우스</span> <span>7배</span></li>
      <li id="플러시"><span>플러시</span> <span>5배</span></li>
      <li id="스트레이트"><span>스트레이트</span> <span>3배</span></li>
      <li id="트리플"><span>트리플</span> <span>2배</span></li>
      <li id="투페어"><span>투페어</span> <span>1배</span></li>
      <li id="원페어"><span>원페어</span> <span>0.5배</span></li>
    </ul>
  </section>

  <section id="gameArea">
    <div id="cards" class="cards"></div>
    <div class="button-group">
      <button id="startBtn">시작</button>
      <button id="exchangeBtn" style="display:none;">교환</button>
    </div>
    <p id="result" class="result-text"></p>
  </section>

  <div id="miniConfirmUI" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; border: 3px solid #ffcc00; padding: 30px; z-index: 10000; text-align: center; color: white; border-radius: 15px; min-width: 280px; box-shadow: 0 0 50px rgba(0,0,0,0.8);">
    <h2 id="confirmMsg" style="margin-bottom: 25px; font-size: 1.1rem; line-height: 1.6; color: #fff;"></h2>
    <div style="display: flex; gap: 15px; justify-content: center;">
      <button id="acceptBtn" style="padding: 12px 30px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 1rem;">수락</button>
      <button id="rejectBtn" style="padding: 12px 30px; background: #dc3545; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 1rem;">거절</button>
    </div>
  </div>

<div id="howToUI" style="
    display: none; 
    position: fixed; 
    top: 50%; 
    left: 50%; 
    transform: translate(-50%, -50%); 
    background: #1a1a1a; 
    border: 3px solid #4a90e2; 
    padding: 20px; 
    z-index: 10001; 
    text-align: center; 
    color: white; 
    border-radius: 20px; 
    width: 85%; 
    max-width: 340px; 
    box-shadow: 0 0 50px rgba(0,0,0,0.9);
">
  
  <h2 id="howToTitle" style="
      margin: 10px 0 20px 0; 
      color: #4a90e2; 
      font-size: 1.4rem; 
      font-weight: bold; 
      transform: rotate(-3deg); 
      display: inline-block;
  "></h2>
  
  <div id="howToContent" style="
      text-align: left; 
      line-height: 1.7; 
      font-size: 1.05rem; 
      margin-bottom: 25px; 
      background: #252525; 
      padding: 15px 20px; 
      border-radius: 12px; 
      max-height: 280px; 
      overflow-y: auto; 
      border: 1px solid #333;
  ">
  </div>
  
  <button id="howToCloseBtn" style="
    display: block;          /* 블록 요소로 변경 */
    margin: 20px auto 5px;   /* 위쪽 20px 여백, 좌우 auto로 '중앙 정렬', 아래 5px */
    padding: 13px 0; 
    background: #4a90e2; 
    color: white; 
    border: none; 
    cursor: pointer; 
    border-radius: 10px; 
    font-weight: bold; 
    width: 90%;              /* 창 너비의 90%만 차지하게 해서 좌우 여백 생성 */
    font-size: 1.1rem;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: background 0.2s;
">닫기</button>
</div>

  <section id="miniGame" class="mini-game" style="display:none;">
    <h2 id="ui-mini-title" style="color: #ffcc00;">DOUBLE CHANCE</h2>
    <div class="mini-cards" style="display: flex; justify-content: center; gap: 20px; margin: 20px 0;">
      <div id="leftCard" class="card">
        <div class="inner flip">
          <div class="front"></div>
          <div class="back"></div>
        </div>
      </div>
      <div id="rightCard" class="card">
        <div class="inner flip">
          <div class="front"></div>
          <div class="back"></div>
        </div>
      </div>
    </div>
    
    <div class="button-group">
      <button id="ui-high-btn" onclick="guess('high')">더 큼 (HIGH)</button>
      <button id="ui-low-btn" onclick="guess('low')">더 작음 (LOW)</button>
     
    </div>
    <p id="miniResult" class="result-text" style="font-weight: bold; font-size: 1.2rem; margin-top: 15px;"></p>
  </section>
</div>

</body>
</html>
